<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding - Waypoint</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="icon" type="image/png" href="assets/logo.png">

    <!-- Theme Initialization -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <style>
        .onboarding-chat-container {
            max-width: 800px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--shadow-xl);
        }

        .chat-header {
            padding: var(--space-lg) var(--space-xl);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            background: var(--surface-soft);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-xl);
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
            scroll-behavior: smooth;
        }

        .chat-input-area {
            padding: var(--space-xl);
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .chat-input-wrap {
            display: flex;
            gap: var(--space-md);
            background: var(--surface-soft);
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 8px 12px 8px 20px;
            transition: all var(--transition-base);
        }

        .chat-input-wrap:focus-within {
            border-color: var(--primary-blue);
            box-shadow: var(--shadow-glow);
        }

        .chat-textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 10px 0;
            font-size: var(--text-base);
            font-family: var(--font-primary);
            resize: none;
            max-height: 120px;
            color: #1a1a1a; /* Explicit dark color for light mode */
        }

        [data-theme="dark"] .chat-textarea {
            color: #ffffff !important;
        }

        .chat-textarea::placeholder {
            color: var(--gray-400);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        .msg-row {
            display: flex;
            gap: var(--space-md);
            max-width: 85%;
        }

        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-bubble {
            padding: var(--space-md) var(--space-xl);
            border-radius: var(--radius-xl);
            font-size: var(--text-base);
            line-height: 1.6;
        }

        .msg-bubble.ai {
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .msg-bubble.user {
            background: var(--gradient-primary);
            color: white;
            border-top-right-radius: 4px;
        }

        .progress-stepper {
            padding: 12px var(--space-xl);
            background: var(--surface-soft);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-300);
            transition: all 0.3s;
        }

        .step-dot.active {
            background: var(--primary-blue);
            transform: scale(1.4);
        }

        .step-dot.done {
            background: var(--success);
        }

        .roadmap-card {
            background: var(--gradient-subtle);
            border: 1px solid var(--primary-blue);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            margin-top: var(--space-md);
        }

        .roadmap-task {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-md);
            padding: var(--space-md);
            background: var(--surface);
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--primary-blue);
        }
        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--gray-400);
            border-radius: 50%;
            animation: typing 1s infinite alternate;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            from { opacity: 0.3; transform: translateY(0); }
            to { opacity: 1; transform: translateY(-4px); }
        }
    </style>
</head>

<body>
    <div class="onboarding-chat-container">
        <!-- Progress -->
        <div class="progress-stepper" id="progressStepper">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <!-- Header -->
        <div class="chat-header">
            <div class="chat-avatar">
                <img src="assets/logo.png" alt="Logo" style="width:32px; height:32px; object-fit:contain;">
            </div>
            <div>
                <h3 style="margin: 0; font-size: var(--text-lg);">Alex — Waypoint Counselor</h3>
                <p style="margin: 0; font-size: 12px; color: var(--success);">Online • Onboarding Session</p>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <!-- Messages injected by JS -->
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <div class="chat-input-wrap">
                <textarea id="chatInput" class="chat-textarea" placeholder="Type your answer here..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polyline points="22 2 15 22 11 13 2 9 22 2"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script type="module" src="js/onboarding-chat.js"></script>
</body>

</html>
